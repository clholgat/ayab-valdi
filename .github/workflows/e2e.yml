name: E2E

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  web-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          # Bazel resolves the full multi-platform dependency graph (boost,
          # Android SDK, Swift toolchain, etc.) even for the web-only build,
          # which exceeds the runner's default free space. Remove large
          # unused preinstalled SDKs/runtimes; keep the Android SDK itself
          # (just its system-images) since Bazel still resolves paths under it.
          sudo rm -rf /usr/local/lib/android/sdk/system-images 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet 2>/dev/null || true
          sudo rm -rf /opt/ghc 2>/dev/null || true
          sudo rm -rf /usr/local/.ghcup 2>/dev/null || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Fetch Valdi Bazel registry
        run: bash ../scripts/ensure-valdi-registry.sh

      - uses: bazelbuild/setup-bazelisk@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/web/package-lock.json

      - name: Install libtinfo5 compatibility symlink
        run: |
          # Valdi's pinned LLVM toolchain (clang) dynamically links against
          # libtinfo.so.5, which ubuntu-latest (24.04+) no longer ships (it
          # only has libtinfo.so.6). Without this, `Build ayab_web` fails with
          # "clang: error while loading shared libraries: libtinfo.so.5:
          # cannot open shared object file". Symlink the ABI-compatible
          # libtinfo6 onto the name clang expects.
          LIB=$(ldconfig -p | grep libtinfo.so.6 | awk '{print $NF}' | head -1)
          sudo ln -sf "$LIB" "$(dirname "$LIB")/libtinfo.so.5"

      - name: Build ayab_web
        run: bazel build :ayab_web --define disable_minify_web=true

      - name: Install web dependencies
        working-directory: src/web
        run: npm ci

      - name: Run Puppeteer E2E
        working-directory: src/web
        run: npm run e2e

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: src/web/e2e/artifacts/*.png
