name: E2E

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  web-e2e:
    # Pinned to 22.04 (not ubuntu-latest): Valdi's pinned LLVM/clang toolchain
    # binary is linked against libtinfo.so.5, which 24.04+ dropped in favor of
    # libtinfo.so.6 (a different, ABI-incompatible major soname - symlinking
    # the .so.6 file onto the .so.5 name isn't enough, since clang needs
    # symbol version NCURSES_TINFO_5.0 that .so.6 doesn't export). The
    # libtinfo5 package is still in 22.04's apt repos (installed below);
    # 24.04's repos dropped it entirely.
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - name: Install libtinfo5
        run: sudo apt-get update && sudo apt-get install -y libtinfo5

      - name: Free disk space
        run: |
          # Bazel resolves the full multi-platform dependency graph (boost,
          # Android SDK, Swift toolchain, etc.) even for the web-only build,
          # which exceeds the runner's default free space. Remove large
          # unused preinstalled SDKs/runtimes; keep the Android SDK itself
          # (just its system-images) since Bazel still resolves paths under it.
          sudo rm -rf /usr/local/lib/android/sdk/system-images 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet 2>/dev/null || true
          sudo rm -rf /opt/ghc 2>/dev/null || true
          sudo rm -rf /usr/local/.ghcup 2>/dev/null || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Fetch Valdi Bazel registry
        run: bash ../scripts/ensure-valdi-registry.sh

      - uses: bazelbuild/setup-bazelisk@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/web/package-lock.json

      - name: Build ayab_web
        run: bazel build :ayab_web --define disable_minify_web=true

      - name: Install web dependencies
        working-directory: src/web
        run: npm ci

      - name: Run Puppeteer E2E
        working-directory: src/web
        run: npm run e2e

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: src/web/e2e/artifacts/*.png
